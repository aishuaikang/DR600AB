<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0b1118" />
    <title>UAV Control System</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #03070d;
      }

      .app-boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        color: #e8fbff;
        background: radial-gradient(circle at 50% 40%, rgba(38, 201, 255, 0.16), transparent 28rem), #03070d;
        font-family: "Noto Sans SC", system-ui, sans-serif;
      }

      .app-boot-loader__frame {
        display: grid;
        justify-items: center;
        gap: 14px;
        border: 1px solid rgba(38, 201, 255, 0.28);
        border-radius: 8px;
        padding: 34px 42px 30px;
        background: rgba(5, 13, 24, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36), inset 0 0 36px rgba(38, 201, 255, 0.08);
        text-align: center;
      }

      .app-boot-loader__ring {
        width: 54px;
        height: 54px;
        border: 2px solid rgba(38, 201, 255, 0.18);
        border-top-color: #26c9ff;
        border-radius: 999px;
        animation: app-boot-spin 0.9s linear infinite;
      }

      .app-boot-loader__frame strong {
        color: #ffffff;
        font-size: 18px;
        font-weight: 800;
      }

      .app-boot-loader__frame span:last-child {
        color: rgba(184, 235, 248, 0.76);
        font-size: 13px;
        font-weight: 700;
      }

      @keyframes app-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }

    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot-loader" role="status" aria-live="polite">
        <div class="app-boot-loader__frame">
          <span class="app-boot-loader__ring"></span>
          <strong>UAV Control System</strong>
          <span>Loading screen</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
